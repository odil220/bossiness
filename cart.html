<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="odil - Your shopping cart">
  <title>Cart - odil</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- CSS Modules -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/utilities.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">RareLoop</a>
      
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="products.html" class="nav-link">Products</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <button class="header-btn theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <a href="cart.html" class="header-btn" aria-label="Shopping cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <span class="badge hidden" id="cart-count">0</span>
        </a>
        <a href="#" class="header-btn wishlist-header-btn" id="wishlist-toggle" aria-label="Wishlist">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
          </svg>
          <span class="badge hidden" id="wishlist-count">0</span>
        </a>
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Navigation -->
  <nav class="mobile-nav" id="mobile-nav">
    <ul class="mobile-nav-list">
      <li><a href="index.html" class="mobile-nav-link">Home</a></li>
      <li><a href="products.html" class="mobile-nav-link">Products</a></li>
    </ul>
  </nav>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <!-- Breadcrumb -->
      <nav class="breadcrumb">
        <a href="index.html" class="breadcrumb-link">Home</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Cart</span>
      </nav>

      <!-- Page Title -->
      <h1 class="page-title">Shopping Cart</h1>

      <!-- Cart Content -->
      <div id="cart-content">
        <!-- Empty Cart -->
        <div class="empty-state" id="empty-cart" style="display: none;">
          <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <h3 class="empty-state-title">Your cart is empty</h3>
          <p class="empty-state-text">Looks like you haven't added any items yet.</p>
          <a href="products.html" class="btn btn-primary mt-lg">Browse Products</a>
        </div>

        <!-- Cart Items -->
        <div id="cart-items" style="display: block;">
          <div id="cart-items-list">
            <!-- Cart items will be dynamically inserted here -->
          </div>

          <!-- Cart Summary -->
          <div class="cart-summary">
            <div class="divider"></div>
            <div class="cart-total">
              <span style="font-size: var(--font-size-xl);">Total</span>
              <span class="cart-total-amount" id="cart-total">$0.00</span>
            </div>
            <button class="btn btn-primary btn-lg" style="width: 100%;" id="checkout-btn" disabled>Checkout</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <span class="footer-brand">odil</span>
        <nav class="footer-links">
          <a href="#" class="footer-link">Privacy</a>
          <a href="#" class="footer-link">Terms</a>
        </nav>
        <span class="footer-copyright">© 2026 RareLoop. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <!-- JavaScript Modules -->
  <script src="js/utilities.js"></script>
  <script src="js/state.js"></script>
  <script src="js/products.js"></script>
  <script src="js/events.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
